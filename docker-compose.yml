version: '3.8'

services:

  # ============================================================
  # Service Registry (Eureka Server)
  # ============================================================
#  service-registry:
#    build:
#      context: ./service-registry
  service-registry:
    build:
      context: .
      dockerfile: service-registry/Dockerfile
    container_name: service-registry
    ports:
      - "8761:8761"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8761/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 5
    networks:
      - ecommerce-network

  # ============================================================
  # API Gateway
  # ============================================================
  api-gateway:
    build:
      context: ./api-gateway
      dockerfile: Dockerfile
    container_name: api-gateway
    ports:
      - "8080:8080"
    environment:
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://service-registry:8761/eureka/
    depends_on:
      service-registry:
        condition: service_healthy
    networks:
      - ecommerce-network

  # ============================================================
  # User Service
  # ============================================================
  user-service:
    build:
      context: ./user-service
      dockerfile: Dockerfile
    container_name: user-service
    ports:
      - "8082:8082"
    environment:
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://service-registry:8761/eureka/
      - SPRING_DATASOURCE_URL=jdbc:h2:mem:userdb
    depends_on:
      service-registry:
        condition: service_healthy
    networks:
      - ecommerce-network

  # ============================================================
  # Product Service
  # ============================================================
  product-service:
    build:
      context: ./product-service
      dockerfile: Dockerfile
    container_name: product-service
    ports:
      - "8081:8081"
    environment:
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://service-registry:8761/eureka/
      - SPRING_DATASOURCE_URL=jdbc:h2:mem:productdb
    depends_on:
      service-registry:
        condition: service_healthy
    networks:
      - ecommerce-network

  # ============================================================
  # Order Service
  # ============================================================
  order-service:
    build:
      context: ./order-service
      dockerfile: Dockerfile
    container_name: order-service
    ports:
      - "8083:8083"
    environment:
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://service-registry:8761/eureka/
      - SPRING_DATASOURCE_URL=jdbc:h2:mem:orderdb
    depends_on:
      service-registry:
        condition: service_healthy
      product-service:
        condition: service_started
    networks:
      - ecommerce-network

  # ============================================================
  # Notification Service
  # ============================================================
  notification-service:
    build:
      context: ./notification-service
      dockerfile: Dockerfile
    container_name: notification-service
    ports:
      - "8084:8084"
    environment:
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://service-registry:8761/eureka/
      - MAIL_USERNAME=${MAIL_USERNAME:-noreply@ecommerce.com}
      - MAIL_PASSWORD=${MAIL_PASSWORD:-secret}
    depends_on:
      service-registry:
        condition: service_healthy
    networks:
      - ecommerce-network

networks:
  ecommerce-network:
    driver: bridge
